<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#16a34a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="营养追踪"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>每日营养追踪</title>
  <style>
    /* ============================================================
       全局 Reset & 变量
    ============================================================ */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --green:#16a34a; --green2:#15803d; --green-bg:#f0fdf4; --green-mid:#bbf7d0;
      --bg:#f5f5f0; --card:#fff; --text:#1c1917; --text2:#78716c; --text3:#a8a29e;
      --danger:#ef4444; --warn:#f59e0b; --ok:#22c55e;
      --blue:#3b82f6; --purple:#a855f7;
      --radius:14px; --radius-sm:8px;
      --shadow:0 2px 12px rgba(0,0,0,.08);
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;}

    /* ============================================================
       整体布局
    ============================================================ */
    #root{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;background:var(--bg);}

    /* 顶部标题栏 */
    .app-header{
      background:var(--green);color:#fff;
      padding:12px 16px 10px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
      padding-top:calc(12px + env(safe-area-inset-top));
    }
    .app-title{font-size:18px;font-weight:700;letter-spacing:.5px;}
    .app-subtitle{font-size:12px;opacity:.8;margin-top:1px;}

    /* 主内容滚动区 */
    #mainPage{
      flex:1;overflow-y:auto;padding:12px 12px 8px;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
    }

    /* 底部Tab导航 */
    .tab-bar{
      display:flex;background:var(--card);
      border-top:1px solid #e5e7eb;
      padding-bottom:env(safe-area-inset-bottom);
      flex-shrink:0;
    }
    .tab-btn{
      flex:1;display:flex;flex-direction:column;align-items:center;
      padding:8px 4px 6px;
      border:none;background:transparent;color:var(--text3);
      font-size:10px;font-weight:500;cursor:pointer;transition:color .2s;
    }
    .tab-btn .tab-icon{font-size:22px;line-height:1;margin-bottom:2px;}
    .tab-btn.active{color:var(--green);}
    .tab-btn.active .tab-icon{transform:scale(1.1);}

    /* ============================================================
       通用组件
    ============================================================ */

    /* 日期导航 */
    .date-nav{
      display:flex;align-items:center;justify-content:space-between;
      background:var(--card);border-radius:var(--radius);
      padding:10px 14px;margin-bottom:12px;box-shadow:var(--shadow);
    }
    .date-btn{
      width:32px;height:32px;border-radius:50%;border:none;
      background:var(--green-bg);color:var(--green);
      font-size:20px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    }
    .date-btn:disabled{opacity:.3;cursor:default;}
    .date-label{text-align:center;}
    .date-main{display:block;font-size:15px;font-weight:700;color:var(--text);}
    .date-sub{display:block;font-size:12px;color:var(--text2);margin-top:2px;}

    /* 卡片 */
    .info-card,.dist-card,.adv-card,.nutr-card,.med-list{
      background:var(--card);border-radius:var(--radius);
      box-shadow:var(--shadow);margin-bottom:12px;padding:14px;
    }
    .info-card-title,.dist-title,.adv-title,.section-title,.nutr-header .section-title{
      font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;
    }

    /* 个人信息网格 */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .info-item{background:var(--green-bg);border-radius:var(--radius-sm);padding:8px 10px;display:flex;flex-direction:column;gap:2px;}
    .info-label{font-size:11px;color:var(--text2);}
    .info-val{font-size:14px;font-weight:700;color:var(--green);}
    .info-note{font-size:11px;color:var(--text3);margin-top:8px;}

    /* 热量圆形仪表盘 */
    .cal-gauge{
      background:var(--card);border-radius:var(--radius);
      box-shadow:var(--shadow);margin-bottom:12px;
      padding:16px;text-align:center;
    }
    .gauge-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;}
    .gauge-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto 10px;}
    .gauge-svg{width:140px;height:140px;}
    .gauge-center{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      display:flex;flex-direction:column;align-items:center;
    }
    .gauge-val{font-size:26px;font-weight:800;color:var(--text);}
    .gauge-unit{font-size:12px;color:var(--text2);}
    .gauge-target{font-size:13px;color:var(--text2);}

    /* 状态提示条 */
    .status-tip{
      border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;
      font-size:14px;line-height:1.6;
    }
    .tip-ok{background:#f0fdf4;color:#166534;border-left:4px solid var(--ok);}
    .tip-warn{background:#fffbeb;color:#92400e;border-left:4px solid var(--warn);}
    .tip-danger{background:#fef2f2;color:#991b1b;border-left:4px solid var(--danger);}

    /* 分布条 */
    .dist-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .dist-label{font-size:13px;width:60px;flex-shrink:0;}
    .dist-bar-wrap{flex:1;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;}
    .dist-bar{height:100%;background:var(--green);border-radius:4px;transition:width .5s;}
    .dist-val{font-size:12px;color:var(--text2);width:110px;text-align:right;flex-shrink:0;}

    /* 减肥建议 */
    .adv-body{font-size:13px;line-height:1.8;color:var(--text);}
    .adv-body p{margin-bottom:4px;}

    /* 营养素卡片 */
    .nutr-header{margin-bottom:4px;}
    .nutr-card{margin-bottom:10px;}
    .nutr-row1{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .nutr-icon{font-size:18px;}
    .nutr-label{flex:1;font-size:14px;font-weight:600;color:var(--text);}
    .badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;}
    .badge-ok{background:#dcfce7;color:#166534;}
    .badge-warn{background:#fef9c3;color:#854d0e;}
    .badge-danger{background:#fee2e2;color:#991b1b;}
    .nutr-bar-wrap{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin-bottom:6px;}
    .nutr-bar{height:100%;border-radius:4px;transition:width .5s;}
    .nutr-bar.ok{background:var(--ok);}
    .nutr-bar.low{background:var(--warn);}
    .nutr-bar.vlow{background:var(--danger);}
    .nutr-vals{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);}
    .nutr-tip{
      margin-top:8px;font-size:12px;line-height:1.7;
      background:#fffbeb;border-radius:var(--radius-sm);padding:8px 10px;color:#78350f;
    }
    .nutr-over{background:#fef2f2;color:#991b1b;}

    /* ============================================================
       饮食记录分区
    ============================================================ */
    .add-food-btn{
      width:100%;padding:13px;border:2px dashed var(--green-mid);
      border-radius:var(--radius);background:var(--green-bg);
      color:var(--green);font-size:15px;font-weight:600;cursor:pointer;
      margin-bottom:12px;transition:all .2s;
    }
    .add-food-btn:active{background:var(--green-mid);}

    .meal-block{
      background:var(--card);border-radius:var(--radius);
      box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;
    }
    .meal-header{
      display:flex;justify-content:space-between;align-items:center;
      background:var(--green-bg);padding:10px 14px;
    }
    .meal-name{font-size:14px;font-weight:700;color:var(--green);}
    .meal-cal{font-size:13px;color:var(--text2);}

    .food-row{padding:10px 14px;border-bottom:1px solid #f5f5f0;}
    .food-row:last-child{border-bottom:none;}
    .food-row-main{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
    .food-name-text{font-size:14px;font-weight:500;color:var(--text);}
    .food-gram{font-size:13px;color:var(--text2);}
    .food-row-sub{display:flex;align-items:center;gap:6px;}
    .food-cal-text{font-size:12px;color:var(--text2);flex:1;}
    .match-badge{font-size:10px;padding:2px 6px;border-radius:10px;background:#dcfce7;color:#166534;}
    .match-badge.nomatch{background:#f3f4f6;color:#6b7280;}
    .del-btn{
      width:22px;height:22px;border-radius:50%;border:none;
      background:#fee2e2;color:#ef4444;font-size:12px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
      margin-left:auto;
    }

    /* ============================================================
       药品记录分区
    ============================================================ */
    .med-note{
      font-size:12px;background:#f0f9ff;color:#0369a1;
      border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:12px;
    }
    .med-row{
      padding:10px 14px;border-bottom:1px solid #f5f5f0;
    }
    .med-row:last-child{border-bottom:none;}
    .med-row-main{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
    .med-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .med-row-info{flex:1;}
    .med-name{font-size:14px;font-weight:600;color:var(--text);}
    .med-dose{font-size:13px;color:var(--text2);margin-left:8px;}
    .med-row-sub{display:flex;align-items:center;gap:6px;padding-left:18px;}
    .med-time{font-size:12px;color:var(--text3);}
    .med-hint{font-size:11px;color:var(--text3);flex:1;}

    .quick-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;margin-top:4px;}
    .med-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
    .med-quick-btn{
      padding:10px 8px;border-radius:var(--radius-sm);border:none;
      background:var(--green-bg);color:var(--green);
      font-size:13px;font-weight:500;cursor:pointer;text-align:center;
    }
    .med-quick-btn.taken{background:#dcfce7;color:#166534;opacity:.7;}
    .custom-med-btn{
      width:100%;padding:11px;border-radius:var(--radius-sm);
      border:1.5px dashed #d1d5db;background:#fff;
      color:var(--text2);font-size:13px;cursor:pointer;
    }

    /* ============================================================
       空状态
    ============================================================ */
    .empty-state{
      text-align:center;padding:40px 20px;color:var(--text2);
    }
    .empty-icon{font-size:48px;margin-bottom:12px;}
    .empty-state p{font-size:14px;margin-bottom:4px;}
    .empty-sub{font-size:12px;color:var(--text3)!important;}

    /* ============================================================
       弹窗
    ============================================================ */
    #modalOverlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.5);z-index:1000;
      align-items:flex-end;justify-content:center;
    }
    #modalBox{
      background:var(--card);width:100%;max-width:480px;
      border-radius:20px 20px 0 0;
      max-height:88vh;overflow-y:auto;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .modal-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 16px 12px;border-bottom:1px solid #f5f5f0;
    }
    .modal-header h3{font-size:16px;font-weight:700;color:var(--text);}
    .modal-close{
      width:28px;height:28px;border-radius:50%;border:none;
      background:#f3f4f6;color:var(--text2);font-size:14px;cursor:pointer;
    }
    .modal-body{padding:12px 16px;}
    .modal-footer{
      display:flex;gap:10px;padding:12px 16px;
      border-top:1px solid #f5f5f0;
    }
    .field-row{margin-bottom:12px;}
    .field-row label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:5px;}
    .field-row input,.field-row select{
      width:100%;padding:11px 12px;border:1.5px solid #e5e7eb;
      border-radius:var(--radius-sm);font-size:15px;color:var(--text);
      background:#fff;outline:none;
    }
    .field-row input:focus,.field-row select:focus{border-color:var(--green);}
    .match-hint{font-size:12px;margin-bottom:8px;line-height:1.5;min-height:16px;}
    .matched{color:#166534;}
    .unmatched{color:#92400e;}
    .manual-hint{font-size:12px;color:var(--warn);margin-bottom:8px;padding:6px 10px;background:#fffbeb;border-radius:var(--radius-sm);}
    .btn-cancel{flex:1;padding:12px;border-radius:var(--radius-sm);border:1.5px solid #e5e7eb;background:#fff;color:var(--text2);font-size:15px;cursor:pointer;}
    .btn-confirm{flex:2;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
    .btn-confirm:active{background:var(--green2);}

    .med-modal-info{font-size:13px;color:var(--text2);background:var(--green-bg);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;}

    /* 食物搜索下拉 */
    .search-dropdown{
      position:absolute;top:100%;left:0;right:0;z-index:100;
      background:#fff;border:1.5px solid #e5e7eb;border-top:none;
      border-radius:0 0 var(--radius-sm) var(--radius-sm);
      max-height:200px;overflow-y:auto;
      box-shadow:0 4px 12px rgba(0,0,0,.1);
    }
    .search-item{
      padding:10px 12px;border-bottom:1px solid #f5f5f0;cursor:pointer;
      display:flex;justify-content:space-between;align-items:center;
    }
    .search-item:last-child{border-bottom:none;}
    .search-item:hover{background:var(--green-bg);}
    .search-item span:first-child{font-size:14px;color:var(--text);}
    .search-item-cal{font-size:11px;color:var(--text2);}

    /* 果汁弹窗 */
    .juice-list{display:flex;flex-direction:column;gap:6px;max-height:250px;overflow-y:auto;}
    .juice-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f5f5f0;}
    .juice-row:last-child{border-bottom:none;}
    .juice-label{font-size:14px;color:var(--text);flex:1;display:flex;align-items:center;gap:6px;cursor:pointer;}
    .juice-check{width:16px;height:16px;accent-color:var(--green);}
    .juice-gram{padding:6px 8px;border:1.5px solid #e5e7eb;border-radius:var(--radius-sm);font-size:14px;outline:none;}
    .juice-gram:focus{border-color:var(--green);}
    .juice-preview{
      background:var(--green-bg);border-radius:var(--radius-sm);
      padding:10px 12px;margin-bottom:12px;font-size:13px;
    }
    .juice-preview .matched{font-weight:600;color:#166534;margin-bottom:6px;display:block;}
    .nutr-preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:4px;}
    .nutr-preview-grid span{font-size:12px;color:var(--text2);}

    /* ============================================================
       安装横幅
    ============================================================ */
    .install-banner{
      display:none;position:fixed;bottom:0;left:0;right:0;
      background:var(--green);color:#fff;
      padding:10px 14px;z-index:999;
      align-items:center;gap:8px;
    }
    .banner-text{flex:1;font-size:13px;}
    .install-banner button{padding:6px 12px;border-radius:20px;border:none;font-size:13px;cursor:pointer;}
    #installBtn{background:#fff;color:var(--green);font-weight:700;}
    .dismiss-btn{background:rgba(255,255,255,.2);color:#fff;}

    /* ============================================================
       统计模块
    ============================================================ */
    .stats-period-tabs{
      display:flex;gap:6px;margin-bottom:12px;
    }
    .stats-period-btn{
      flex:1;padding:7px 4px;border-radius:20px;border:1.5px solid #e5e7eb;
      background:#fff;color:var(--text2);font-size:12px;font-weight:500;
      cursor:pointer;transition:all .2s;text-align:center;
    }
    .stats-period-btn.active{
      background:var(--green);color:#fff;border-color:var(--green);
    }
    .stats-overview-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;
    }
    .stats-ov-card{
      background:var(--card);border-radius:var(--radius);
      box-shadow:var(--shadow);padding:14px;text-align:center;
    }
    .stats-ov-icon{font-size:28px;margin-bottom:6px;}
    .stats-ov-val{font-size:22px;font-weight:800;color:var(--text);margin-bottom:2px;}
    .stats-ov-label{font-size:12px;color:var(--text2);}
    .stats-ov-card.full-span{grid-column:1/-1;}

    /* 每日热量条 */
    .stats-day-bar{
      display:flex;align-items:center;gap:8px;margin-bottom:8px;
    }
    .stats-day-label{font-size:12px;color:var(--text2);width:42px;flex-shrink:0;}
    .stats-day-bar-wrap{flex:1;height:14px;background:#e5e7eb;border-radius:7px;overflow:hidden;}
    .stats-day-bar-fill{
      height:100%;border-radius:7px;transition:width .4s;
      min-width:2px;
    }
    .stats-day-bar-fill.over{background:#ef4444;}
    .stats-day-bar-fill.good{background:#22c55e;}
    .stats-day-bar-fill.low{background:#f59e0b;}
    .stats-day-bar-val{font-size:11px;color:var(--text2);width:44px;text-align:right;flex-shrink:0;}

    /* 营养达标进度 */
    .stats-nutri-row{
      display:flex;align-items:center;gap:8px;margin-bottom:10px;
    }
    .stats-nutri-icon{font-size:16px;width:24px;text-align:center;flex-shrink:0;}
    .stats-nutri-name{font-size:13px;width:60px;flex-shrink:0;}
    .stats-nutri-bar-wrap{flex:1;height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden;}
    .stats-nutri-bar{height:100%;border-radius:5px;transition:width .5s;}
    .stats-nutri-pct{font-size:12px;color:var(--text2);width:50px;text-align:right;flex-shrink:0;}

    /* 吃药日历 */
    .stats-calendar{
      display:grid;grid-template-columns:repeat(7,1fr);gap:4px;
    }
    .stats-cal-day{
      aspect-ratio:1;border-radius:4px;display:flex;align-items:center;
      justify-content:center;font-size:11px;font-weight:600;
    }
    .stats-cal-day.taken{background:#dcfce7;color:#166534;}
    .stats-cal-day.missed{background:#fee2e2;color:#991b1b;}
    .stats-cal-day.no-record{background:#f3f4f6;color:#a8a29e;}
    .stats-cal-day.header{background:transparent;color:var(--text2);font-weight:500;}
  </style>
</head>
<body>
<div id="root">

  <!-- 顶部标题栏 -->
  <header class="app-header">
    <div>
      <div class="app-title">🥗 每日营养追踪</div>
      <div class="app-subtitle">科学饮食，健康生活</div>
    </div>
  </header>

  <!-- 主内容区 -->
  <main id="mainPage"></main>

  <!-- 底部Tab导航 -->
  <nav class="tab-bar">
    <button class="tab-btn" data-tab="food">
      <span class="tab-icon">🍽️</span>饮食记录
    </button>
    <button class="tab-btn" data-tab="calories">
      <span class="tab-icon">🔥</span>热量分析
    </button>
    <button class="tab-btn" data-tab="nutrition">
      <span class="tab-icon">🌿</span>营养分析
    </button>
    <button class="tab-btn" data-tab="meds">
      <span class="tab-icon">💊</span>吃药记录
    </button>
    <button class="tab-btn" data-tab="stats">
      <span class="tab-icon">📊</span>统计
    </button>
  </nav>

</div>

<!-- 弹窗 -->
<div id="modalOverlay">
  <div id="modalBox"></div>
</div>

<!-- 安装横幅 -->
<div id="installBanner" class="install-banner">
  <span class="banner-text">📱 安装到手机桌面，像原生APP一样使用！</span>
  <button id="installBtn">安装</button>
  <button class="dismiss-btn" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
</div>

<!-- JS：顺序不能乱 -->
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
  // Service Worker 注册
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
